model:
  name: gpt2
  device: cpu  # or cuda if available

sae:
  release: gpt2-small-res-jb
  id: blocks.8.hook_resid_pre
  layer: 7  # hook transformer.h[7] output = resid_pre at block 8

data:
  raw_dir: data/raw
  processed_dir: data/processed
  prompt_families_file: data/processed/prompt_families.json

features:
  top_k: 20
  batch_size: 16

evaluation:
  overlap_metric: jaccard
  min_family_size: 3

visualization:
  output_dir: reports/figures
  dpi: 150

seed: 42
